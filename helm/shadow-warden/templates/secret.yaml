apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shadow-warden.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "shadow-warden.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Warden gateway
  ANTHROPIC_API_KEY:       {{ .Values.warden.secret.anthropicApiKey | quote }}
  WARDEN_API_KEY:          {{ .Values.warden.secret.wardenApiKey | quote }}
  SECRET_KEY:              {{ .Values.warden.secret.secretKey | quote }}
  LLM_BASE_URL:            {{ .Values.warden.secret.llmBaseUrl | quote }}
  LLM_API_KEY:             {{ .Values.warden.secret.llmApiKey | quote }}
  SLACK_WEBHOOK_URL:       {{ .Values.warden.secret.slackWebhookUrl | quote }}
  PAGERDUTY_ROUTING_KEY:   {{ .Values.warden.secret.pagerdutyRoutingKey | quote }}
  SPLUNK_HEC_URL:          {{ .Values.warden.secret.splunkHecUrl | quote }}
  SPLUNK_HEC_TOKEN:        {{ .Values.warden.secret.splunkHecToken | quote }}
  ELASTIC_URL:             {{ .Values.warden.secret.elasticUrl | quote }}
  ELASTIC_API_KEY:         {{ .Values.warden.secret.elasticApiKey | quote }}
  # ── v2.5 secrets ─────────────────────────────────────────────────────────
  NVIDIA_API_KEY:          {{ .Values.warden.secret.nvidiaApiKey | default "" | quote }}
  OPENROUTER_API_KEY:      {{ .Values.warden.secret.openrouterApiKey | default "" | quote }}
  {{- if .Values.nexus.enabled }}
  THREAT_FEED_API_KEY:     {{ .Values.nexus.secret.apiKey | quote }}
  {{- end }}
  {{- if .Values.saml.enabled }}
  SAML_IDP_X509_CERT:      {{ .Values.saml.secret.idpX509Cert | quote }}
  {{- end }}
  {{- if .Values.arq.enabled }}
  ARQ_EMAIL_SMTP_URL:      {{ .Values.arq.config.emailSmtpUrl | quote }}
  ARQ_FROM_ADDR:           {{ .Values.arq.config.emailFromAddr | quote }}
  GEO_WEBHOOK_URL:         {{ .Values.arq.config.geoWebhookUrl | quote }}
  {{- end }}
  # Database — resolved from subchart or external values
  POSTGRES_PASSWORD:       {{ include "shadow-warden.postgresqlPassword" . | quote }}
  # Redis — resolved from subchart or external values
  REDIS_PASSWORD:          {{ include "shadow-warden.redisPassword" . | quote }}
{{- if .Values.warden.apiKeysJson }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shadow-warden.fullname" . }}-api-keys
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "shadow-warden.labels" . | nindent 4 }}
type: Opaque
stringData:
  keys.json: |
    {{ .Values.warden.apiKeysJson | indent 4 }}
{{- end }}
