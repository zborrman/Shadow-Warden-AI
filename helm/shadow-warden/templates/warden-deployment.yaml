apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shadow-warden.fullname" . }}-warden
  labels:
    {{- include "shadow-warden.labels" . | nindent 4 }}
    app.kubernetes.io/component: warden
spec:
  replicas: {{ .Values.warden.replicaCount }}
  selector:
    matchLabels:
      {{- include "shadow-warden.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: warden
  template:
    metadata:
      labels:
        {{- include "shadow-warden.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: warden
    spec:
      securityContext:
        {{- toYaml .Values.warden.podSecurityContext | nindent 8 }}
      {{- with .Values.warden.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.warden.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.warden.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: warden
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.warden.image.repository }}:{{ .Values.warden.image.tag }}"
          imagePullPolicy: {{ .Values.warden.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.warden.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            {{- range $key, $val := .Values.warden.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- range .Values.warden.secretKeys }}
            - name: {{ . }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.warden.secretRef }}
                  key: {{ . }}
                  optional: true
            {{- end }}
            - name: WARDEN_OCR_BACKEND
              value: {{ .Values.features.ocr.backend | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.warden.resources | nindent 12 }}
          volumeMounts:
            - name: warden-data
              mountPath: /warden/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: warden-data
          {{- if .Values.warden.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "shadow-warden.fullname" . }}-warden-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
