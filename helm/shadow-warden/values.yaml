# Shadow Warden AI — Helm values
# Override any value with --set key=value or -f custom-values.yaml

# ── Global ────────────────────────────────────────────────────────────────────
global:
  imageRegistry: ghcr.io
  imagePullSecrets: []

# ── Warden gateway ────────────────────────────────────────────────────────────
warden:
  image:
    repository: zborrman/shadow-warden
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

  # Pod scheduling
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: warden
            topologyKey: kubernetes.io/hostname

  tolerations: []
  nodeSelector: {}

  # Security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  # Environment variables (non-secret)
  env:
    SEMANTIC_THRESHOLD: "0.72"
    STRICT_MODE: "false"
    ERS_ENABLED: "true"
    SHADOW_BAN_ENABLED: "true"
    S3_ENABLED: "false"
    GDPR_LOG_RETENTION_DAYS: "30"
    GDPR_AUTO_PURGE: "true"
    WARDEN_OCR_BACKEND: "tesseract"

  # Secret keys — create a Kubernetes Secret named "warden-secrets" with these keys
  secretRef: warden-secrets
  secretKeys:
    - WARDEN_API_KEY
    - ANTHROPIC_API_KEY
    - VAULT_MASTER_KEY
    - SLACK_WEBHOOK_URL
    - REDIS_URL
    - DATABASE_URL

  service:
    type: ClusterIP
    port: 8001

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""        # use cluster default
    accessMode: ReadWriteOnce

# ── Redis ─────────────────────────────────────────────────────────────────────
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    existingSecret: warden-secrets
    existingSecretPasswordKey: REDIS_PASSWORD
  master:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    persistence:
      enabled: true
      size: 5Gi

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    existingSecret: warden-secrets
    secretKeys:
      adminPasswordKey: POSTGRES_PASSWORD
      userPasswordKey:  POSTGRES_PASSWORD
      database: warden
  primary:
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    persistence:
      enabled: true
      size: 20Gi

# ── MinIO (Evidence Vault) ────────────────────────────────────────────────────
minio:
  enabled: false   # set true for on-prem S3; use AWS S3 env vars otherwise
  mode: standalone
  rootUser: warden-admin
  rootPassword: ""   # set via existingSecret
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
  hosts:
    - host: api.shadow-warden-ai.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: warden-tls
      hosts:
        - api.shadow-warden-ai.com

# ── Features ──────────────────────────────────────────────────────────────────
features:
  ocr:
    backend: tesseract    # tesseract | vision | disabled
  evolutionEngine:
    enabled: true         # false for air-gapped mode
  shadowBan:
    enabled: true
  gdprAutoRetention:
    enabled: true
    retentionDays: 30

# ── OpenTelemetry ──────────────────────────────────────────────────────────────
otel:
  enabled: false          # set to true to emit traces
  collectorEndpoint: "http://otel-collector.monitoring:4317"
  sampleRate: "1.0"       # 0.0–1.0; reduce to 0.1 in high-traffic prod
  serviceName: "shadow-warden"

# ── OTel Collector sidecar (optional — deploy separately or use existing) ──────
otelCollector:
  deploy: false           # true = deploy collector DaemonSet/Deployment in cluster
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.103.1"
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      memory_limiter:
        limit_mib: 100
        spike_limit_mib: 20
        check_interval: 5s
    exporters:
      otlp/jaeger:
        endpoint: jaeger.monitoring:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/jaeger]
