# Shadow Warden AI — Loki config (R4: bounded log retention)
#
# Identical to grafana/loki:2.9.4's baked-in /etc/loki/local-config.yaml
# (schema/storage/paths unchanged — do not edit those without a migration
# plan, they must match whatever already exists on disk in the loki-data
# volume) plus two additions: limits_config.retention_period and an enabled
# compactor. Without these, Loki retains logs forever — the G6 disk-hygiene
# gap (docs/resilience-plan.md).

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

# ── R4 additions ──────────────────────────────────────────────────────────────
limits_config:
  retention_period: 168h   # 7 days

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
  compaction_interval: 10m
  retention_delete_delay: 2h
