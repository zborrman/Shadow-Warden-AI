apiVersion: 1

# ── Shadow Warden AI — Grafana Alerting Rules ────────────────────────────────
#
# Two SLO-based alerts:
#
#   1. HighErrorRate  — HTTP 5xx rate > 1 % over 5 min
#      Fires when the gateway is returning server errors at a rate
#      that suggests a systemic fault (model failure, OOM, etc.).
#
#   2. HighP99Latency — /filter P99 latency > 500 ms over 5 min
#      Fires when the 99th-percentile response time for the primary
#      filter endpoint breaches the 500 ms SLO.
#
# Both alerts are in the "Shadow Warden" folder and use the
# "WardenAlerts" contact point (configure in Grafana UI or add a
# contactPoints section below to wire up Slack / PagerDuty).
# ─────────────────────────────────────────────────────────────────────────────

groups:
  - orgId: 1
    name: warden_slo
    folder: Shadow Warden
    interval: 1m   # evaluate every minute
    rules:

      # ── 1. High HTTP Error Rate ──────────────────────────────────────────────
      - uid: warden-high-error-rate
        title: "Warden — High Error Rate (> 1%)"
        condition: C

        data:
          # A: total requests in the last 5 minutes
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden"}[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          # B: 5xx requests in the last 5 minutes
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden", status=~"5.."}[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          # C: error rate > 1 %
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$B / $A > 0.01"

        noDataState: OK
        execErrState: Alerting
        for: 5m
        labels:
          severity: critical
          team: warden
        annotations:
          summary: "Warden error rate above 1%"
          description: >
            HTTP 5xx responses have exceeded 1% of total traffic for 5 minutes.
            Check warden container logs and /health endpoint.
            Dashboard: http://localhost:3000/d/warden-overview

      # ── 2. High P99 Latency on /filter ───────────────────────────────────────
      - uid: warden-high-p99-latency
        title: "Warden — /filter P99 latency > 500 ms"
        condition: C

        data:
          # A: P99 latency for /filter endpoint
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                histogram_quantile(
                  0.99,
                  sum by (le) (
                    rate(http_request_duration_seconds_bucket{
                      job="warden",
                      handler="/filter"
                    }[5m])
                  )
                )
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          # C: latency > 0.5 s
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0.5"

        noDataState: OK
        execErrState: Alerting
        for: 5m
        labels:
          severity: warning
          team: warden
        annotations:
          summary: "Warden /filter P99 latency above 500ms"
          description: >
            The 99th-percentile latency for POST /filter has exceeded 500ms
            for 5 consecutive minutes.  Likely cause: ML model contention or
            Redis cache miss storm.
            Dashboard: http://localhost:3000/d/warden-overview

      # ── 3. Corpus Canary Failure (Self-Healing trigger) ───────────────────────
      - uid: warden-canary-failing
        title: "Warden — Corpus Canary Failure (poisoning suspected)"
        condition: C

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "warden_corpus_canary_failing"
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0"

        noDataState: OK
        execErrState: Alerting
        for: 0s
        labels:
          severity: critical
          team: warden
          category: corpus_poisoning
        annotations:
          summary: "Corpus canary examples failing — poisoning suspected"
          description: >
            One or more of the 10 canary examples now scores below 0.70
            against the threat corpus.  Self-Healing rollback has been
            triggered automatically.  Review CorpusHealthMonitor logs and
            check for suspicious Evolution Engine activity.
            Dashboard: http://localhost:3000/d/ai-security-health

      # ── 4. Corpus Centroid Drift ──────────────────────────────────────────────
      - uid: warden-corpus-drift
        title: "Warden — Corpus centroid drift exceeds threshold"
        condition: C

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "warden_corpus_drift_score"
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0.08"

        noDataState: OK
        execErrState: Alerting
        for: 5m
        labels:
          severity: warning
          team: warden
          category: corpus_poisoning
        annotations:
          summary: "Corpus centroid has drifted beyond 0.08"
          description: >
            The cosine distance between the current corpus centroid and the
            baseline has exceeded 0.08 for 5 minutes.  This indicates the
            Evolution Engine may have absorbed adversarial examples that are
            gradually shifting the detection boundary toward benign space.
            Dashboard: http://localhost:3000/d/ai-security-health

      # ── 5. Availability SLO Breach (99.9% uptime) ────────────────────────────
      - uid: warden-availability-slo
        title: "Warden — Availability SLO breach (< 99.9% over 1h)"
        condition: C

        data:
          # A: successful requests in the last hour
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden", status!~"5.."}[1h]))
              intervalMs: 60000
              maxDataPoints: 720
              instant: true

          # B: all requests in the last hour
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden"}[1h]))
              intervalMs: 60000
              maxDataPoints: 720
              instant: true

          # C: success rate < 99.9 %
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A / $B < 0.999"

        noDataState: OK
        execErrState: Alerting
        for: 10m
        labels:
          severity: critical
          team: warden
          category: slo
        annotations:
          summary: "Warden availability below 99.9% SLO"
          description: >
            The success rate for all Warden endpoints has fallen below 99.9% over
            the past hour. This breaches the Enterprise SLA commitment.
            Immediate investigation required.
            Dashboard: http://localhost:3000/d/warden-overview

      # ── 6. Shadow Ban Rate Spike ───────────────────────────────────────────────
      - uid: warden-shadow-ban-spike
        title: "Warden — Shadow ban rate spike (> 0.2 bans/s)"
        condition: C

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(warden_shadow_ban_total[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          # C: > 0.2 shadow bans per second = 12 per minute
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0.2"

        noDataState: OK
        execErrState: OK
        for: 3m
        labels:
          severity: warning
          team: warden
          category: attack_volume
        annotations:
          summary: "High shadow ban rate — likely active attack campaign"
          description: >
            Shadow ban events are firing at > 12 per minute for 3 consecutive minutes.
            This indicates a sustained automated attack campaign targeting this Warden
            instance. Review ERS scores and consider temporary IP-level blocks upstream.
            Dashboard: http://localhost:3000/d/warden-overview

      # ── 5. Data Poisoning Spike ───────────────────────────────────────────────
      - uid: warden-poisoning-spike
        title: "Warden — Data poisoning attack spike"
        condition: C

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(warden_poisoning_attempts_total[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0.1"

        noDataState: OK
        execErrState: Alerting
        for: 2m
        labels:
          severity: critical
          team: warden
          category: corpus_poisoning
        annotations:
          summary: "Data poisoning rate above 6 attempts / minute"
          description: >
            The rate of data poisoning detections has exceeded 0.1 req/s
            (6 per minute) for 2 consecutive minutes.  This may indicate
            an automated boundary-probing or adversarial-perturbation
            campaign targeting this Warden instance.
            Dashboard: http://localhost:3000/d/ai-security-health
