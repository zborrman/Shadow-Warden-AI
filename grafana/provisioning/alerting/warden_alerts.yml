  # ── Fail-open observability (Deep-Eng P0) ────────────────────────────────────
  - orgId: 1
    name: warden_failopen
    folder: Shadow Warden
    interval: 1m
    rules:

      # ── Fail-open spike: a guard errored and requests are being allowed ──────
      - uid: warden-stage-failopen-spike
        title: "Warden — Fail-open spike (guard bypassed)"
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(increase(warden_stage_failopen_total[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0"
        noDataState: OK
        execErrState: Alerting
        for: 0m
        labels:
          severity: critical
          team: warden
        annotations:
          summary: "Warden fail-open events firing — requests may be bypassing a guard"
          description: >
            warden_stage_failopen_total increased in the last 5 minutes: a security
            guard errored and allowed the request through (fail-open). Break down by
            stage/reason in Prometheus. Common causes: Redis down (redis_unavailable),
            model not loaded (model_not_loaded), upstream timeout.

      # ── R3: Pipeline-timeout bypass (whole request skipped security filtering) ──
      # Distinct from the per-stage fail-open above: this fires when the ENTIRE
      # pipeline timed out (PIPELINE_TIMEOUT_MS) and WARDEN_FAIL_STRATEGY=open let
      # the raw, unfiltered request through — every guard was skipped, not just
      # one stage. Only fires at all once PIPELINE_TIMEOUT_MS > 0 (R3); at the
      # default 0 the timeout machinery is disabled and this counter never moves.
      - uid: warden-filter-bypass-spike
        title: "Warden — Pipeline-timeout bypass firing (unfiltered requests passed)"
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(increase(warden_filter_bypasses_total[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0"
        noDataState: OK
        execErrState: Alerting
        for: 0m
        labels:
          severity: critical
          team: warden
        annotations:
          summary: "Warden pipeline-timeout bypass firing — requests skipped ALL security filtering"
          description: >
            warden_filter_bypasses_total increased in the last 5 minutes: the full
            filter pipeline exceeded PIPELINE_TIMEOUT_MS and, under
            WARDEN_FAIL_STRATEGY=open, passed the request through completely
            unfiltered. Check /health for pipeline_timeout_ms and stage latencies —
            likely cause: ML model contention, Redis/DB latency spike, or a hung
            downstream call in one of the 9 pipeline stages.

      # ── Live pipeline canary missing known jailbreaks (detector degraded) ────
      - uid: warden-pipeline-canary-missed
        title: "Warden — Pipeline canary missing jailbreaks"
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                max(warden_pipeline_canary_missed)
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0"
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          severity: critical
          team: warden
        annotations:
          summary: "Warden live canary is missing known jailbreaks — detector degraded"
          description: >
            The live-pipeline canary self-test (warden_pipeline_canary_missed > 0) shows
            the detector is letting blatant jailbreaks through. Likely a bad model/corpus
            deploy. Check GET /health/pipeline?deep=true and recent EvolutionEngine changes.
