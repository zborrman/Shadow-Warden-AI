apiVersion: 1

# ── Shadow Warden AI — Grafana Alerting Rules ────────────────────────────────
#
# Two SLO-based alerts:
#
#   1. HighErrorRate  — HTTP 5xx rate > 1 % over 5 min
#      Fires when the gateway is returning server errors at a rate
#      that suggests a systemic fault (model failure, OOM, etc.).
#
#   2. HighP99Latency — /filter P99 latency > 500 ms over 5 min
#      Fires when the 99th-percentile response time for the primary
#      filter endpoint breaches the 500 ms SLO.
#
# Both alerts are in the "Shadow Warden" folder and use the
# "WardenAlerts" contact point (configure in Grafana UI or add a
# contactPoints section below to wire up Slack / PagerDuty).
# ─────────────────────────────────────────────────────────────────────────────

groups:
  - orgId: 1
    name: warden_slo
    folder: Shadow Warden
    interval: 1m   # evaluate every minute
    rules:

      # ── 1. High HTTP Error Rate ──────────────────────────────────────────────
      - uid: warden-high-error-rate
        title: "Warden — High Error Rate (> 1%)"
        condition: C

        data:
          # A: total requests in the last 5 minutes
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden"}[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          # B: 5xx requests in the last 5 minutes
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden", status=~"5.."}[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          # C: error rate > 1 %
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$B / $A > 0.01"

        noDataState: OK
        execErrState: Alerting
        for: 5m
        labels:
          severity: critical
          team: warden
        annotations:
          summary: "Warden error rate above 1%"
          description: >
            HTTP 5xx responses have exceeded 1% of total traffic for 5 minutes.
            Check warden container logs and /health endpoint.
            Dashboard: http://localhost:3000/d/warden-overview

      # ── 2. High P99 Latency on /filter ───────────────────────────────────────
      - uid: warden-high-p99-latency
        title: "Warden — /filter P99 latency > 500 ms"
        condition: C

        data:
          # A: P99 latency for /filter endpoint
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                histogram_quantile(
                  0.99,
                  sum by (le) (
                    rate(http_request_duration_seconds_bucket{
                      job="warden",
                      handler="/filter"
                    }[5m])
                  )
                )
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          # C: latency > 0.5 s
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0.5"

        noDataState: OK
        execErrState: Alerting
        for: 5m
        labels:
          severity: warning
          team: warden
        annotations:
          summary: "Warden /filter P99 latency above 500ms"
          description: >
            The 99th-percentile latency for POST /filter has exceeded 500ms
            for 5 consecutive minutes.  Likely cause: ML model contention or
            Redis cache miss storm.
            Dashboard: http://localhost:3000/d/warden-overview

      # ── 3. Corpus Canary Failure (Self-Healing trigger) ───────────────────────
      - uid: warden-canary-failing
        title: "Warden — Corpus Canary Failure (poisoning suspected)"
        condition: C

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "warden_corpus_canary_failing"
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0"

        noDataState: OK
        execErrState: Alerting
        for: 0s
        labels:
          severity: critical
          team: warden
          category: corpus_poisoning
        annotations:
          summary: "Corpus canary examples failing — poisoning suspected"
          description: >
            One or more of the 10 canary examples now scores below 0.70
            against the threat corpus.  Self-Healing rollback has been
            triggered automatically.  Review CorpusHealthMonitor logs and
            check for suspicious Evolution Engine activity.
            Dashboard: http://localhost:3000/d/ai-security-health

      # ── 4. Corpus Centroid Drift ──────────────────────────────────────────────
      - uid: warden-corpus-drift
        title: "Warden — Corpus centroid drift exceeds threshold"
        condition: C

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "warden_corpus_drift_score"
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0.08"

        noDataState: OK
        execErrState: Alerting
        for: 5m
        labels:
          severity: warning
          team: warden
          category: corpus_poisoning
        annotations:
          summary: "Corpus centroid has drifted beyond 0.08"
          description: >
            The cosine distance between the current corpus centroid and the
            baseline has exceeded 0.08 for 5 minutes.  This indicates the
            Evolution Engine may have absorbed adversarial examples that are
            gradually shifting the detection boundary toward benign space.
            Dashboard: http://localhost:3000/d/ai-security-health

      # ── 5. Availability SLO Breach (99.9% uptime) ────────────────────────────
      - uid: warden-availability-slo
        title: "Warden — Availability SLO breach (< 99.9% over 1h)"
        condition: C

        data:
          # A: successful requests in the last hour
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden", status!~"5.."}[1h]))
              intervalMs: 60000
              maxDataPoints: 720
              instant: true

          # B: all requests in the last hour
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden"}[1h]))
              intervalMs: 60000
              maxDataPoints: 720
              instant: true

          # C: success rate < 99.9 %
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A / $B < 0.999"

        noDataState: OK
        execErrState: Alerting
        for: 10m
        labels:
          severity: critical
          team: warden
          category: slo
        annotations:
          summary: "Warden availability below 99.9% SLO"
          description: >
            The success rate for all Warden endpoints has fallen below 99.9% over
            the past hour. This breaches the Enterprise SLA commitment.
            Immediate investigation required.
            Dashboard: http://localhost:3000/d/warden-overview

      # ── 6. Shadow Ban Rate Spike ───────────────────────────────────────────────
      - uid: warden-shadow-ban-spike
        title: "Warden — Shadow ban rate spike (> 0.2 bans/s)"
        condition: C

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(warden_shadow_ban_total[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          # C: > 0.2 shadow bans per second = 12 per minute
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0.2"

        noDataState: OK
        execErrState: OK
        for: 3m
        labels:
          severity: warning
          team: warden
          category: attack_volume
        annotations:
          summary: "High shadow ban rate — likely active attack campaign"
          description: >
            Shadow ban events are firing at > 12 per minute for 3 consecutive minutes.
            This indicates a sustained automated attack campaign targeting this Warden
            instance. Review ERS scores and consider temporary IP-level blocks upstream.
            Dashboard: http://localhost:3000/d/warden-overview

      # ── 5. Data Poisoning Spike ───────────────────────────────────────────────
      - uid: warden-poisoning-spike
        title: "Warden — Data poisoning attack spike"
        condition: C

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(warden_poisoning_attempts_total[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0.1"

        noDataState: OK
        execErrState: Alerting
        for: 2m
        labels:
          severity: critical
          team: warden
          category: corpus_poisoning
        annotations:
          summary: "Data poisoning rate above 6 attempts / minute"
          description: >
            The rate of data poisoning detections has exceeded 0.1 req/s
            (6 per minute) for 2 consecutive minutes.  This may indicate
            an automated boundary-probing or adversarial-perturbation
            campaign targeting this Warden instance.
            Dashboard: http://localhost:3000/d/ai-security-health

      # ── 7. SLO Burn-Rate — Fast Burn (Critical / Page Now) ───────────────────
      #
      # Google SRE multi-window burn-rate alert.
      # SLO: 99.9% availability → error budget = 0.1% = 43.8 min/month.
      #
      # Fast burn: if the error rate exceeds 14.4× the SLO budget rate,
      # 2% of the monthly error budget is consumed in just 1 hour.
      # Multi-window (1h + 5min) eliminates false positives from short spikes.
      #
      # burn_rate = actual_error_rate / slo_error_rate
      #           = error_rate / 0.001
      # Threshold: 14.4 → page immediately, 2% budget consumed in 1h
      #
      - uid: warden-burn-fast
        title: "Warden — SLO Burn Rate FAST (> 14.4×, page now)"
        condition: D

        data:
          # A: error rate over 1h window
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden", status=~"5.."}[1h]))
                /
                sum(rate(http_requests_total{job="warden"}[1h]))
              intervalMs: 60000
              maxDataPoints: 720
              instant: true

          # B: error rate over 5min window (short window to confirm fast burn)
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden", status=~"5.."}[5m]))
                /
                sum(rate(http_requests_total{job="warden"}[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          # C: 1h burn rate > 14.4× SLO (0.001 * 14.4 = 0.0144)
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0.0144"

          # D: both windows must fire (AND gate — prevents false positives)
          - refId: D
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$C == 1 && $B > 0.0144"

        noDataState: OK
        execErrState: Alerting
        for: 2m
        labels:
          severity: critical
          team: warden
          category: slo_burn
          window: fast
        annotations:
          summary: "Warden SLO fast burn — 2% error budget consumed in 1h"
          description: >
            CRITICAL: The error rate has exceeded 14.4× the SLO budget rate
            (confirmed on both 1h and 5min windows). At this rate, 2% of the
            monthly error budget is consumed every hour — the entire monthly
            budget will be gone in ~50 hours.
            Immediate investigation required.
            Runbook: docs.shadow-warden-ai.com/guides/slo-burn-runbook
            Dashboard: http://localhost:3000/d/warden-overview

      # ── 8. SLO Burn-Rate — Slow Burn (Warning / Ticket) ─────────────────────
      #
      # Slow burn: if the error rate exceeds 6× the SLO budget rate,
      # 5% of the monthly error budget is consumed in 6 hours.
      # Multi-window (6h + 30min) reduces noise from transient dips.
      #
      # Threshold: 6 → file a ticket, investigate within business hours
      #
      - uid: warden-burn-slow
        title: "Warden — SLO Burn Rate SLOW (> 6×, file ticket)"
        condition: D

        data:
          # A: error rate over 6h window
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 21600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden", status=~"5.."}[6h]))
                /
                sum(rate(http_requests_total{job="warden"}[6h]))
              intervalMs: 60000
              maxDataPoints: 720
              instant: true

          # B: error rate over 30min window (short window confirmation)
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{job="warden", status=~"5.."}[30m]))
                /
                sum(rate(http_requests_total{job="warden"}[30m]))
              intervalMs: 60000
              maxDataPoints: 720
              instant: true

          # C: 6h burn rate > 6× SLO (0.001 * 6 = 0.006)
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 21600
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0.006"

          # D: both windows must exceed threshold
          - refId: D
            queryType: ""
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$C == 1 && $B > 0.006"

        noDataState: OK
        execErrState: OK
        for: 15m
        labels:
          severity: warning
          team: warden
          category: slo_burn
          window: slow
        annotations:
          summary: "Warden SLO slow burn — 5% error budget consumed in 6h"
          description: >
            WARNING: The error rate has exceeded 6× the SLO budget rate
            (confirmed on both 6h and 30min windows). At this rate, 5% of the
            monthly error budget is consumed every 6 hours.
            File a ticket and investigate during business hours.
            Runbook: docs.shadow-warden-ai.com/guides/slo-burn-runbook
            Dashboard: http://localhost:3000/d/warden-overview

      # ── 9. Host Disk Usage High (R4) ─────────────────────────────────────────
      # Requires node-exporter running (COMPOSE_PROFILES=monitoring in prod
      # .env — profile-gated off by default for Windows/WSL2 dev, where the
      # required host-mount propagation isn't available). Prometheus already
      # scrapes node-exporter:9100 (job "node") regardless of whether the
      # target is actually up, so this alert simply has no data until the
      # profile is enabled — noDataState: OK below avoids a false page from
      # that dev-default gap, but "no data" here in prod means node-exporter
      # isn't running and should be investigated too.
      - uid: warden-host-disk-high
        title: "Warden — Host disk usage above 80%"
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                (1 - node_filesystem_avail_bytes{mountpoint="/", fstype!="tmpfs"}
                / node_filesystem_size_bytes{mountpoint="/", fstype!="tmpfs"}) * 100
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 80"
        noDataState: OK
        execErrState: OK
        for: 10m
        labels:
          severity: warning
          team: warden
          category: disk
        annotations:
          summary: "Host root filesystem usage above 80%"
          description: >
            The VPS root filesystem has been above 80% used for 10 minutes.
            On the current 40GB disk this is ~8GB free. Check `docker system df`
            for reclaimable build cache/images, and Loki/ClickHouse volume
            growth (both have retention policies as of R4, but verify they're
            actually enforcing). Escalates to critical behavior (deploys
            failing, containers unable to start) well before 100%.

  - orgId: 1
    name: warden_domain
    folder: Shadow Warden
    interval: 1m
    rules:

      # ── 1. Marketplace — Escrow Stuck ─────────────────────────────────────────
      - uid: warden-marketplace-escrow-stuck
        title: "Warden — Marketplace escrow count stuck (> 50 for 30 min)"
        condition: B

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "warden_marketplace_escrow_active"
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 50"

        noDataState: OK
        execErrState: OK
        for: 30m
        labels:
          severity: critical
          team: warden
          category: marketplace
        annotations:
          summary: "Marketplace escrow queue stuck above 50 active escrows"
          description: >
            The number of active escrows has exceeded 50 for 30 consecutive
            minutes. Indicates a processing backlog or settlement bug.
            Dashboard: http://localhost:3000/d/sw-marketplace

      # ── 2. Compliance — Score Drop ────────────────────────────────────────────
      - uid: warden-compliance-score-drop
        title: "Warden — Overall compliance score dropped below 70"
        condition: B

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "min(warden_compliance_overall_score)"
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A < 70"

        noDataState: OK
        execErrState: OK
        for: 10m
        labels:
          severity: warning
          team: warden
          category: compliance
        annotations:
          summary: "Compliance posture score dropped below 70%"
          description: >
            Overall compliance score is below 70 for 10 minutes. Review the
            Compliance dashboard and remediate HIGH-severity gaps.
            Dashboard: http://localhost:3000/d/sw-compliance

      # ── 3. Compliance — Critical Gap Spike ───────────────────────────────────
      - uid: warden-compliance-gap-critical
        title: "Warden — More than 5 compliance gaps open"
        condition: B

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "max(warden_compliance_gaps_open)"
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 5"

        noDataState: OK
        execErrState: Alerting
        for: 0s
        labels:
          severity: critical
          team: warden
          category: compliance
        annotations:
          summary: "More than 5 compliance gaps are open"
          description: >
            Total open compliance gaps exceeds 5. May indicate a regression or
            a deployment that has not been validated against governance rules.
            Dashboard: http://localhost:3000/d/sw-compliance

      # ── 4. Community — Peering Down ───────────────────────────────────────────
      - uid: warden-community-peer-down
        title: "Warden — All community peerings lost"
        condition: B

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "warden_community_peering_connections"
              intervalMs: 15000
              maxDataPoints: 43200
              instant: true

          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A == 0"

        noDataState: OK
        execErrState: OK
        for: 5m
        labels:
          severity: critical
          team: warden
          category: community
        annotations:
          summary: "All community peering connections have dropped to zero"
          description: >
            No active inter-community peering connections detected. SEP entity
            transfers will fail. Check the peering registry and MASQUE tunnels.
            Dashboard: http://localhost:3000/d/sw-community

      # ── 5. Community — No SEP Transfers ──────────────────────────────────────
      - uid: warden-community-sep-silent
        title: "Warden — No SEP transfers in 1 hour"
        condition: B

        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: "increase(warden_community_sep_transfers_total[1h])"
              intervalMs: 60000
              maxDataPoints: 720
              instant: true

          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A == 0"

        noDataState: OK
        execErrState: OK
        for: 0s
        labels:
          severity: warning
          team: warden
          category: community
        annotations:
          summary: "No SEP entity transfers in the last 1 hour"
          description: >
            Zero SEP transfers recorded in the last hour. May indicate a pipeline
            freeze, peering misconfiguration, or TransferGuard blocking all
            transfers at the Causal Arbiter stage.
            Dashboard: http://localhost:3000/d/sw-community

  - orgId: 1
    name: warden_voice
    folder: Shadow Warden
    interval: 1m
    rules:

      # ── Voice Latency ────────────────────────────────────────────────────────
      - uid: warden-voice-latency-high
        title: "Warden Voice — P95 Latency > 1500ms"
        condition: C
        for: 5m
        labels:
          severity: warning
          category: voice
        annotations:
          summary: "Voice end-to-end latency P95 > 1500ms"
          description: >
            Voice pipeline P95 latency has exceeded 1500ms for 5 minutes.
            Investigate ASR provider latency, NLU processing time, or network congestion.
            Dashboard: http://localhost:3000/d/sw-voice
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PROMETHEUS
            model:
              expr: histogram_quantile(0.95, rate(warden_voice_e2e_latency_ms_bucket[5m]))
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params: [1500]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              refId: C
              type: classic_conditions

      # ── Voice Error Rate ─────────────────────────────────────────────────────
      - uid: warden-voice-error-rate-high
        title: "Warden Voice — Error Rate > 5%"
        condition: C
        for: 5m
        labels:
          severity: critical
          category: voice
        annotations:
          summary: "Voice pipeline error rate > 5%"
          description: >
            More than 5% of voice sessions are encountering pipeline errors. Check
            warden_voice_errors_total{stage} for the failing stage (asr/nlu/tts/guardian).
            Dashboard: http://localhost:3000/d/sw-voice
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PROMETHEUS
            model:
              expr: rate(warden_voice_errors_total[5m]) / (rate(warden_voice_sessions_started_total[5m]) + 0.001)
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              refId: C
              type: classic_conditions

      # ── Deepfake Detection ───────────────────────────────────────────────────
      - uid: warden-voice-deepfake
