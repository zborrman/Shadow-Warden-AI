<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Warden AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      background: #0f1117;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px 20px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo { font-size: 28px; }
    .header-text h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .header-text p  { font-size: 11px; color: #6b7280; margin-top: 2px; }

    /* Status bar */
    .status-bar {
      padding: 10px 20px;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e293b;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .dot.active  { background: #22c55e; }
    .dot.inactive { background: #ef4444; animation: none; }
    .dot.warning  { background: #f59e0b; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .toggle-btn {
      background: none; border: 1px solid #374151; color: #9ca3af;
      border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
    }
    .toggle-btn:hover { border-color: #6b7280; color: #e5e7eb; }

    /* Stats row */
    .stats {
      display: flex;
      padding: 12px 20px;
      gap: 8px;
      border-bottom: 1px solid #1e293b;
    }
    .stat-card {
      flex: 1;
      background: #1f2937;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-card .num  { font-size: 22px; font-weight: 700; color: #fff; }
    .stat-card .lbl  { font-size: 10px; color: #6b7280; margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }
    .stat-card.red   .num { color: #ef4444; }
    .stat-card.green .num { color: #22c55e; }

    /* Form section */
    .section { padding: 16px 20px; border-bottom: 1px solid #1e293b; }
    .section-title { font-size: 11px; color: #6b7280; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }

    label { font-size: 12px; color: #9ca3af; display: block; margin-bottom: 4px; }
    input[type="text"], input[type="password"] {
      width: 100%; background: #1f2937; border: 1px solid #374151;
      color: #e5e7eb; border-radius: 6px; padding: 8px 10px; font-size: 13px;
      outline: none; margin-bottom: 10px;
    }
    input:focus { border-color: #3b82f6; }

    /* Save button */
    .btn-save {
      width: 100%; background: #3b82f6; color: #fff; border: none;
      border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-save:hover { background: #2563eb; }
    .btn-save:disabled { background: #1e3a5f; color: #6b7280; cursor: default; }

    /* Test button */
    .btn-test {
      width: 100%; background: transparent; color: #6b7280;
      border: 1px solid #374151; border-radius: 8px; padding: 8px;
      font-size: 13px; cursor: pointer; margin-top: 8px;
    }
    .btn-test:hover { border-color: #6b7280; color: #e5e7eb; }

    /* Toast message */
    .toast {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }
    .toast.success { background: #052e16; color: #4ade80; border: 1px solid #166534; display: block; }
    .toast.error   { background: #2d0a0a; color: #f87171; border: 1px solid #7f1d1d; display: block; }

    /* Protected sites */
    .site-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .site-pill {
      background: #1f2937; border: 1px solid #374151;
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; color: #9ca3af;
    }
    .site-pill.active { border-color: #166534; color: #4ade80; background: #052e16; }

    /* Footer */
    .footer { padding: 10px 20px; text-align: center; color: #374151; font-size: 11px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">🛡️</div>
    <div class="header-text">
      <h1>Shadow Warden AI</h1>
      <p>AI Data Protection for Business</p>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-indicator">
      <div class="dot active" id="status-dot"></div>
      <span id="status-text">Protected</span>
    </div>
    <button class="toggle-btn" id="toggle-btn">Disable</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card red">
      <div class="num" id="blocks-today">0</div>
      <div class="lbl">Blocked today</div>
    </div>
    <div class="stat-card green">
      <div class="num" id="requests-today">0</div>
      <div class="lbl">Requests checked</div>
    </div>
  </div>

  <!-- Config section -->
  <div class="section">
    <div class="section-title">Gateway Configuration</div>

    <label for="gateway-url">Shadow Warden URL</label>
    <input type="text" id="gateway-url" placeholder="https://your-hetzner.com" />

    <label for="api-key">API Key (from your administrator)</label>
    <input type="password" id="api-key" placeholder="••••••••••••••••" />

    <label for="tenant-id">Tenant ID</label>
    <input type="text" id="tenant-id" placeholder="your-company" />

    <label for="ollama-url">Local AI URL (for YELLOW zone redirect)</label>
    <input type="text" id="ollama-url" placeholder="http://localhost:3000" />

    <button class="btn-save" id="save-btn">Save & Connect</button>
    <button class="btn-test" id="test-btn">Test Connection</button>

    <div class="toast" id="toast"></div>
  </div>

  <!-- Protected sites -->
  <div class="section">
    <div class="section-title">Protected Sites</div>
    <div class="site-list">
      <div class="site-pill active" id="site-chatgpt">ChatGPT</div>
      <div class="site-pill active" id="site-claude">Claude.ai</div>
      <div class="site-pill active" id="site-gemini">Gemini</div>
      <div class="site-pill active" id="site-copilot">Copilot</div>
    </div>
  </div>

  <div class="footer">Shadow Warden AI v1.0 · <span id="tenant-display">Not configured</span></div>

  <script src="popup.js"></script>
</body>
</html>
