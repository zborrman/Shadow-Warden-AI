{{- if .Values.warden.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shadow-warden.fullname" . }}-warden
  labels: {{- include "shadow-warden.labels" . | nindent 4 }}
    app.kubernetes.io/component: warden
spec:
  replicas: {{ .Values.warden.replicas }}
  selector:
    matchLabels: {{- include "shadow-warden.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: warden
  template:
    metadata:
      labels: {{- include "shadow-warden.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: warden
    spec:
      containers:
        - name: warden
          image: "{{ .Values.global.image.registry }}/{{ .Values.warden.image.repository }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.warden.service.port }}
          envFrom:
            - secretRef:
                name: {{ include "shadow-warden.fullname" . }}-secrets
          env:
            {{- range $k, $v := .Values.warden.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources: {{- toYaml .Values.warden.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.warden.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.warden.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "shadow-warden.fullname" . }}-warden
  labels: {{- include "shadow-warden.labels" . | nindent 4 }}
spec:
  selector: {{- include "shadow-warden.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: warden
  ports:
    - port: {{ .Values.warden.service.port }}
      targetPort: {{ .Values.warden.service.port }}
{{- if .Values.warden.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "shadow-warden.fullname" . }}-warden-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "shadow-warden.fullname" . }}-warden
  minReplicas: {{ .Values.warden.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.warden.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.warden.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
