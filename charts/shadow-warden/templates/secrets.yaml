apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shadow-warden.fullname" . }}-secrets
  labels: {{- include "shadow-warden.labels" . | nindent 4 }}
type: Opaque
stringData:
  WARDEN_API_KEY: {{ .Values.secrets.wardenApiKey | default "" | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
  VAULT_MASTER_KEY: {{ .Values.secrets.vaultMasterKey | default "" | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | default "changeme" | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secrets.minioRootPassword | default "changeme" | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | default "" | quote }}
  SOVEREIGN_ATTEST_KEY: {{ .Values.secrets.sovereignAttestKey | default "" | quote }}
