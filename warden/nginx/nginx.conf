# ─────────────────────────────────────────────────────────────────────────────
#  Shadow Warden AI — Nginx  (production config with HTTPS)
#
#  Routes:
#    /                           →  static landing page
#    /filter /health /metrics    →  warden:8001  (API)
#    /v1/ /gdpr/ /filter/        →  warden:8001  (API)
#
#  SSL: self-signed cert at /etc/nginx/ssl/ (behind Cloudflare proxy)
#       Set Cloudflare SSL/TLS mode to "Full" in dashboard
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker internal DNS — required for upstream DNS resolution
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ── Load balancing: warden gateway pool ───────────────────────────────────
    # Docker Compose service DNS returns all replica IPs for "warden".
    # least_conn distributes requests to the replica with fewest active connections.
    # Run: docker compose up -d --scale warden=3
    upstream warden_pool {
        least_conn;
        server warden:8001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # Security headers
    add_header X-Frame-Options        "DENY"                                    always;
    add_header X-Content-Type-Options "nosniff"                                 always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"         always;
    add_header X-XSS-Protection       "1; mode=block"                          always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: allow fetch() to API subdomain from all landing/portal pages
    add_header Content-Security-Policy
        "default-src 'self'; connect-src 'self' https://api.shadow-warden-ai.com wss://api.shadow-warden-ai.com; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-ancestors 'none';"
        always;

    # ── SSL settings (shared) ───────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Trust Cloudflare real IP headers
    set_real_ip_from  173.245.48.0/20;
    set_real_ip_from  103.21.244.0/22;
    set_real_ip_from  103.22.200.0/22;
    set_real_ip_from  103.31.4.0/22;
    set_real_ip_from  141.101.64.0/18;
    set_real_ip_from  108.162.192.0/18;
    set_real_ip_from  190.93.240.0/20;
    set_real_ip_from  188.114.96.0/20;
    set_real_ip_from  197.234.240.0/22;
    set_real_ip_from  198.41.128.0/17;
    set_real_ip_from  162.158.0.0/15;
    set_real_ip_from  104.16.0.0/13;
    set_real_ip_from  104.24.0.0/14;
    set_real_ip_from  172.64.0.0/13;
    set_real_ip_from  131.0.72.0/22;
    real_ip_header    CF-Connecting-IP;

    # ── Main server ────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;

        client_max_body_size 10M;

        # ACME challenge (for future Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── Landing page (static files) ──────────────────────────────────────
        root /usr/share/nginx/html/landing;
        index index.html;

        location = / {
            try_files /index.html =404;
        }

        location = /login {
            try_files /login.html =404;
        }

        location = /settings {
            try_files /settings.html =404;
        }

        location = /dashboard {
            try_files /dashboard.html =404;
        }

        location = /checkout {
            try_files /checkout.html =404;
        }

        location = /billing {
            try_files /billing.html =404;
        }

        location = /agents {
            try_files /agents.html =404;
        }

        location = /roadmap {
            try_files /roadmap.html =404;
        }

        location = /terms {
            try_files /terms.html =404;
        }

        location = /privacy {
            try_files /privacy.html =404;
        }

        location = /refund {
            try_files /refund.html =404;
        }

        location = /contact {
            try_files /contact.html =404;
        }

        location = /docs {
            try_files /docs.html =404;
        }

        location = /enterprise-guide {
            try_files /enterprise-guide-v29.html =404;
        }

        location = /security {
            try_files /security.html =404;
        }

        location = /qa {
            try_files /qa.html =404;
        }

        location = /soc {
            try_files /soc.html =404;
        }

        location ~* \.(css|js|woff2?|png|jpg|svg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Portal (Next.js) — proxy to tenant UI ───────────────────────────
        # Must come BEFORE the warden API block so /api/hub/* goes to portal
        # (not warden) and _next/* static assets are served correctly.
        # Next.js static assets (CSS, JS chunks)
        location ^~ /_next/ {
            set $portal http://portal:3001;
            proxy_pass          $portal;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── SOC Dashboard (Next.js) ──────────────────────────────────────────
        location ^~ /soc {
            set $dashboard http://dashboard:3002;
            proxy_pass          $dashboard;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_read_timeout  60s;
        }

        location ~ ^/(dashboard|hub|login|api-keys|extension|settings|api/hub|register|forgot-password|reset-password|verify-email)(/.*)?$ {
            set $portal http://portal:3001;
            proxy_pass          $portal;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 5s;
        }

        # ── Warden API — load-balanced proxy to gateway pool ─────────────────
        location ~ ^/(filter|health|metrics|gdpr|v1|batch|redoc|openapi\.json|portal|api|billing|subscription|agents|mcp|threat|output|mask|unmask|admin|tenant|syndicates|tunnels|invites|auth|monitors|ws) {
            proxy_pass          http://warden_pool;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 5s;
            proxy_next_upstream error timeout http_502 http_503;
        }

        # Fallback: anything else → landing page
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
