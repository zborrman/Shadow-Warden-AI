# ─────────────────────────────────────────────────────────────────────────────
#  Shadow Warden AI — Nginx  (minimal production config)
#
#  Routes:
#    http://<server>/          →  warden:8001  (all API requests)
#
#  Deferred (re-enable with full config when monitoring stack is deployed):
#    TLS / HTTPS termination
#    admin.shadow-warden-ai.com  (dashboard + jaeger)
#    feed.shadow-warden-ai.com   (threat feed)
#    mTLS between nginx and warden
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker internal DNS
    resolver 127.0.0.11 valid=30s ipv6=off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # Security headers
    add_header X-Frame-Options        "DENY"              always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header Referrer-Policy        "strict-origin"     always;
    add_header X-XSS-Protection       "1; mode=block"     always;

    # ── Main server ────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 10M;

        # ACME challenge (for future Let's Encrypt setup)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Proxy everything to warden.
        # Using $upstream variable forces lazy DNS resolution (per-request)
        # instead of at startup — nginx starts even if warden is not yet ready.
        location / {
            set $upstream http://warden:8001;
            proxy_pass          $upstream;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 5s;
        }
    }
}
