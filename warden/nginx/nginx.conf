# ─────────────────────────────────────────────────────────────────────────────
#  Shadow Warden AI — Nginx Reverse Proxy
#  Production: Cloudflare → Nginx (TLS) → Docker services
#
#  Virtual hosts:
#    api.shadow-warden-ai.com    →  warden:8001   (filter gateway)
#    admin.shadow-warden-ai.com  →  dashboard:8501 / admin:8502
#    feed.shadow-warden-ai.com   →  feed:8003
#
#  Protected internal paths (Basic Auth):
#    /jaeger/      →  jaeger:16686   (tracing UI — admin only)
#    /dashboard/   →  dashboard:8501 (analytics — admin only)
#    /admin/       →  admin:8502     (MSP admin — admin only)
#
#  TLS:
#    Certificates: /etc/nginx/tls/cert.pem + key.pem
#    Issued by Let's Encrypt via deploy/hetzner.sh (certbot --standalone)
#    OR terminated at Cloudflare edge (origin listens HTTP-only on port 80)
#
#  Basic Auth:
#    /etc/nginx/auth/.htpasswd — generated by scripts/gen_htpasswd.sh
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Real-IP restoration from Cloudflare ──────────────────────────────────
    set_real_ip_from  173.245.48.0/20;
    set_real_ip_from  103.21.244.0/22;
    set_real_ip_from  103.22.200.0/22;
    set_real_ip_from  103.31.4.0/22;
    set_real_ip_from  141.101.64.0/18;
    set_real_ip_from  108.162.192.0/18;
    set_real_ip_from  190.93.240.0/20;
    set_real_ip_from  188.114.96.0/20;
    set_real_ip_from  197.234.240.0/22;
    set_real_ip_from  198.41.128.0/17;
    set_real_ip_from  162.158.0.0/15;
    set_real_ip_from  104.16.0.0/13;
    set_real_ip_from  104.24.0.0/14;
    set_real_ip_from  172.64.0.0/13;
    set_real_ip_from  131.0.72.0/22;
    set_real_ip_from  2400:cb00::/32;
    set_real_ip_from  2606:4700::/32;
    set_real_ip_from  2803:f800::/32;
    set_real_ip_from  2405:b500::/32;
    set_real_ip_from  2405:8100::/32;
    set_real_ip_from  2a06:98c0::/29;
    set_real_ip_from  2c0f:f248::/32;
    real_ip_header    CF-Connecting-IP;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time '
                      'cf_ray=$http_cf_ray country=$http_cf_ipcountry';

    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Docker internal DNS resolver ──────────────────────────────────────────
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Security headers (global) ─────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    server_tokens off;

    # ── mTLS client cert presented by nginx to warden ─────────────────────────
    proxy_ssl_certificate         /etc/nginx/certs/proxy-client.crt;
    proxy_ssl_certificate_key     /etc/nginx/certs/proxy-client.key;
    proxy_ssl_trusted_certificate /etc/nginx/certs/ca.crt;
    proxy_ssl_verify              on;
    proxy_ssl_verify_depth        2;
    proxy_ssl_session_reuse       on;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream warden_backend   { server warden:8001;    keepalive 32; }
    upstream app_backend      { server app:8000;       keepalive 32; }
    upstream analytics_backend{ server analytics:8002; keepalive 16; }
    upstream dashboard_backend{ server dashboard:8501; keepalive 8;  }
    upstream jaeger_backend   { server jaeger:16686;   keepalive 4;  }

    # ── Shared proxy macro (via map — applied per location below) ─────────────
    # proxy_set_header values repeated per location for nginx compatibility.

    # ═══════════════════════════════════════════════════════════════════════════
    # HTTP → HTTPS redirect (all hostnames)
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;

        # Let's Encrypt ACME challenge — must stay on HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # HTTPS — shadow-warden-ai.com (marketing landing)
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name shadow-warden-ai.com www.shadow-warden-ai.com;

        ssl_certificate         /etc/nginx/tls/cert.pem;
        ssl_certificate_key     /etc/nginx/tls/key.pem;
        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache       shared:SSL:10m;
        ssl_session_timeout     1d;
        ssl_session_tickets     off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        root  /usr/share/nginx/html/landing;
        index index.html;

        location / { try_files $uri $uri/ /index.html; }

        location ~* \.(css|js|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # HTTPS — api.shadow-warden-ai.com  →  warden:8001
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name api.shadow-warden-ai.com;

        ssl_certificate         /etc/nginx/tls/cert.pem;
        ssl_certificate_key     /etc/nginx/tls/key.pem;
        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache       shared:SSL:10m;
        ssl_session_timeout     1d;
        ssl_session_tickets     off;

        client_max_body_size 10M;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location / {
            proxy_pass          https://warden_backend;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;
            proxy_set_header    CF-Connecting-IP  $http_cf_connecting_ip;
            proxy_set_header    CF-Ray            $http_cf_ray;
            proxy_set_header    CF-IPCountry      $http_cf_ipcountry;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 5s;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # HTTPS — admin.shadow-warden-ai.com
    # Dashboard (:8501) + Jaeger (/jaeger/) + Admin UI (/admin/)
    # ALL paths protected by Basic Auth
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name admin.shadow-warden-ai.com;

        ssl_certificate         /etc/nginx/tls/cert.pem;
        ssl_certificate_key     /etc/nginx/tls/key.pem;
        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache       shared:SSL:10m;
        ssl_session_timeout     1d;
        ssl_session_tickets     off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Jaeger UI ─────────────────────────────────────────────────────────
        # http://admin.shadow-warden-ai.com/jaeger/
        location /jaeger/ {
            auth_basic           "Shadow Warden — Internal";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;

            proxy_pass          http://jaeger_backend/;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_read_timeout  30s;

            # Jaeger's static assets reference absolute paths — rewrite them
            sub_filter_once     off;
            sub_filter          'src="/'  'src="/jaeger/';
            sub_filter          'href="/' 'href="/jaeger/';
        }

        # ── Streamlit dashboard ───────────────────────────────────────────────
        location / {
            auth_basic           "Shadow Warden — Internal";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;

            proxy_pass          http://dashboard_backend;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;

            # WebSocket (Streamlit live-reload)
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_read_timeout  86400;
        }

        location ~* /_stcore/(stream|health|allowed-message-origins) {
            auth_basic           "Shadow Warden — Internal";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;

            proxy_pass          http://dashboard_backend;
            proxy_set_header    Host              $host;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_http_version  1.1;
            proxy_read_timeout  86400;
        }

        # ── MSP Admin UI ──────────────────────────────────────────────────────
        location /admin/ {
            auth_basic           "Shadow Warden — Internal";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;

            set $admin_target "http://admin:8502";
            proxy_pass          $admin_target/;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_http_version  1.1;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # HTTPS — feed.shadow-warden-ai.com  →  feed:8003
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name feed.shadow-warden-ai.com;

        ssl_certificate         /etc/nginx/tls/cert.pem;
        ssl_certificate_key     /etc/nginx/tls/key.pem;
        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache       shared:SSL:10m;
        ssl_session_timeout     1d;
        ssl_session_tickets     off;

        client_max_body_size 1M;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location / {
            set $feed_target "http://feed:8003";
            proxy_pass          $feed_target;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_read_timeout  30s;
        }
    }
}
