# ─────────────────────────────────────────────────────────────────────────────
#  Shadow Warden AI — Nginx Reverse Proxy
#
#  Routing table:
#    /api/warden/*   →  warden:8001    (filter gateway)
#    /api/*          →  app:8000       (main application)
#    /dashboard/*    →  dashboard:8501 (Streamlit — internal only in prod)
#    /analytics/*    →  analytics:8002 (analytics API)
#    /               →  app:8000       (main application)
#
#  For production:
#    • Replace the HTTP server block with an HTTPS block.
#    • Place TLS certificates in warden/nginx/certs/ and uncomment the
#      ssl_certificate / ssl_certificate_key directives below.
#    • Remove or restrict the /dashboard location (internal tool only).
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Upstream definitions ──────────────────────────────────────────────────

    upstream warden_backend {
        server warden:8001;
    }

    upstream app_backend {
        server app:8000;
    }

    upstream analytics_backend {
        server analytics:8002;
    }

    upstream dashboard_backend {
        server dashboard:8501;
    }

    # ── HTTP server ───────────────────────────────────────────────────────────
    # For production replace this block with an HTTPS server.

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # ── Warden filter gateway ─────────────────────────────────────────────
        location /api/warden/ {
            proxy_pass         http://warden_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Analytics API ─────────────────────────────────────────────────────
        location /analytics/ {
            proxy_pass         http://analytics_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Streamlit dashboard (dev/internal — restrict in production) ───────
        location /dashboard/ {
            proxy_pass         http://dashboard_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_http_version 1.1;
        }

        # ── Streamlit WebSocket (required for auto-refresh) ───────────────────
        location /dashboard/_stcore/stream {
            proxy_pass         http://dashboard_backend/_stcore/stream;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_http_version 1.1;
        }

        # ── Main application (catch-all) ──────────────────────────────────────
        location /api/ {
            proxy_pass         http://app_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass         http://app_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }

    # ── HTTPS template (uncomment and configure for production) ──────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # ... same location blocks as above ...
    # }
}
