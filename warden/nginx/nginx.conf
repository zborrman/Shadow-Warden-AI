# ─────────────────────────────────────────────────────────────────────────────
#  Shadow Warden AI — Nginx Reverse Proxy
#
#  Routing table:
#    /api/warden/*   →  warden:8001    (filter gateway)
#    /api/*          →  app:8000       (main application)
#    /dashboard/*    →  dashboard:8501 (Streamlit — internal only in prod)
#    /analytics/*    →  analytics:8002 (analytics API)
#    /               →  app:8000       (main application)
#
#  For production:
#    • Replace the HTTP server block with an HTTPS block.
#    • Place TLS certificates in warden/nginx/certs/ and uncomment the
#      ssl_certificate / ssl_certificate_key directives below.
#    • Remove or restrict the /dashboard location (internal tool only).
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Upstream definitions ──────────────────────────────────────────────────

    upstream warden_backend {
        server warden:8001;
    }

    upstream app_backend {
        server app:8000;
    }

    upstream analytics_backend {
        server analytics:8002;
    }

    upstream dashboard_backend {
        server dashboard:8501;
    }

    # ── HTTP server ───────────────────────────────────────────────────────────
    # For production replace this block with an HTTPS server.

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # ── Warden filter gateway ─────────────────────────────────────────────
        location /api/warden/ {
            proxy_pass         http://warden_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Analytics API ─────────────────────────────────────────────────────
        location /analytics/ {
            proxy_pass         http://analytics_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Streamlit dashboard (dev/internal — restrict in production) ───────
        location /dashboard/ {
            proxy_pass         http://dashboard_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_http_version 1.1;
        }

        # ── Streamlit WebSocket (required for auto-refresh) ───────────────────
        location /dashboard/_stcore/stream {
            proxy_pass         http://dashboard_backend/_stcore/stream;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_http_version 1.1;
        }

        # ── Main application (catch-all) ──────────────────────────────────────
        location /api/ {
            proxy_pass         http://app_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass         http://app_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }

    # ── HTTPS + mTLS (production) ─────────────────────────────────────────────
    # Prerequisites:
    #   1. Run scripts/gen_certs.sh to generate certs/.
    #   2. Set MTLS_ENABLED=true in .env and restart containers.
    #   3. Replace ssl_certificate with your public-domain cert (Let's Encrypt).
    #      certs/ca.crt is used only to verify internal client certs.
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name your-domain.com;

        # ── Server TLS ───────────────────────────────────────────────────────
        ssl_certificate         /etc/nginx/certs/warden.crt;
        ssl_certificate_key     /etc/nginx/certs/warden.key;
        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache       shared:SSL:10m;
        ssl_session_timeout     1d;
        ssl_session_tickets     off;

        # ── mTLS: verify client cert against our internal CA ─────────────────
        # Change to 'on' to require a cert from every caller.
        ssl_client_certificate  /etc/nginx/certs/ca.crt;
        ssl_verify_client       optional;
        ssl_verify_depth        2;
        ssl_crl                 /etc/nginx/certs/ca.crl;

        # Forward cert result to warden's MTLSMiddleware
        proxy_set_header        X-Client-Cert-Subject  $ssl_client_s_dn;
        proxy_set_header        X-Client-Cert-Verify   $ssl_client_verify;

        # ── Security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           DENY    always;
        add_header X-Content-Type-Options    nosniff always;
        add_header Referrer-Policy           strict-origin always;

        client_max_body_size 10m;

        location /api/warden/ {
            proxy_pass         http://warden_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30s;
        }

        location /analytics/ {
            proxy_pass         http://analytics_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # Restrict dashboard to internal networks in production:
        # allow 10.0.0.0/8; deny all;
        location /dashboard/ {
            proxy_pass         http://dashboard_backend/;
            proxy_set_header   Host       $host;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_http_version 1.1;
        }

        location /dashboard/_stcore/stream {
            proxy_pass         http://dashboard_backend/_stcore/stream;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_http_version 1.1;
        }

        location /api/ {
            proxy_pass         http://app_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        location / {
            proxy_pass         http://app_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
