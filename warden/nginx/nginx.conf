# ─────────────────────────────────────────────────────────────────────────────
#  Shadow Warden AI — Nginx Reverse Proxy
#  Production: Cloudflare → Nginx → Docker services
#
#  Virtual hosts (Cloudflare-terminated TLS):
#    api.shadow-warden-ai.com    →  warden:8001   (filter gateway)
#    admin.shadow-warden-ai.com  →  dashboard:8501 / admin:8502
#    feed.shadow-warden-ai.com   →  feed:8003      (threat intel feed)
#
#  Path-based fallback (single-domain / dev / mTLS):
#    /api/warden/*   →  warden:8001
#    /api/*          →  app:8000
#    /analytics/*    →  analytics:8002
#    /feed/*         →  feed:8003
#    /dashboard/*    →  dashboard:8501  (restrict in prod)
#    /               →  app:8000
#
#  Cloudflare integration:
#    • set_real_ip_from  — trust CF edge IPs, restore client IP
#    • real_ip_header    — read CF-Connecting-IP
#    • X-Real-IP is forwarded as the restored client IP ($remote_addr
#      after real_ip module processing)
#    • TLS is terminated at Cloudflare edge; origin listens on port 80 only.
#      For Cloudflare Full (Strict), replace with the HTTPS server block below.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Real-IP restoration from Cloudflare ──────────────────────────────────
    # After this block, $remote_addr == actual client IP (not CF edge IP).
    # Cloudflare IPv4 ranges (update periodically from https://www.cloudflare.com/ips-v4)
    set_real_ip_from  173.245.48.0/20;
    set_real_ip_from  103.21.244.0/22;
    set_real_ip_from  103.22.200.0/22;
    set_real_ip_from  103.31.4.0/22;
    set_real_ip_from  141.101.64.0/18;
    set_real_ip_from  108.162.192.0/18;
    set_real_ip_from  190.93.240.0/20;
    set_real_ip_from  188.114.96.0/20;
    set_real_ip_from  197.234.240.0/22;
    set_real_ip_from  198.41.128.0/17;
    set_real_ip_from  162.158.0.0/15;
    set_real_ip_from  104.16.0.0/13;
    set_real_ip_from  104.24.0.0/14;
    set_real_ip_from  172.64.0.0/13;
    set_real_ip_from  131.0.72.0/22;
    # Cloudflare IPv6
    set_real_ip_from  2400:cb00::/32;
    set_real_ip_from  2606:4700::/32;
    set_real_ip_from  2803:f800::/32;
    set_real_ip_from  2405:b500::/32;
    set_real_ip_from  2405:8100::/32;
    set_real_ip_from  2a06:98c0::/29;
    set_real_ip_from  2c0f:f248::/32;
    real_ip_header    CF-Connecting-IP;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time '
                      'cf_ray=$http_cf_ray country=$http_cf_ipcountry';

    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Docker internal DNS resolver ──────────────────────────────────────────
    # Required for variable-based proxy_pass and for optional services that
    # may not be running at nginx startup (feed, admin).
    # 127.0.0.11 is Docker's embedded DNS server (present in all compose networks).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Security headers (global) ─────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Hide nginx version
    server_tokens off;

    # ── mTLS: nginx client certificate presented to warden (Mode B) ──────────
    # These vars are set once in the http block and inherited by all servers.
    # When MTLS_ENABLED=false on warden, proxy_ssl_* are ignored (plain HTTP).
    proxy_ssl_certificate     /etc/nginx/certs/proxy-client.crt;
    proxy_ssl_certificate_key /etc/nginx/certs/proxy-client.key;
    proxy_ssl_trusted_certificate /etc/nginx/certs/ca.crt;
    proxy_ssl_verify          on;
    proxy_ssl_verify_depth    2;
    proxy_ssl_session_reuse   on;

    # ── Upstream definitions ──────────────────────────────────────────────────

    upstream warden_backend {
        server warden:8001;
        keepalive 32;
    }

    upstream app_backend {
        server app:8000;
        keepalive 32;
    }

    upstream analytics_backend {
        server analytics:8002;
        keepalive 16;
    }

    upstream dashboard_backend {
        server dashboard:8501;
        keepalive 8;
    }

    # admin and feed use variable proxy_pass (see locations below) so that
    # nginx starts cleanly even when these optional services are not yet up.
    # keepalive is not available with variable proxy_pass — acceptable trade-off.

    # ── Shared proxy header snippet (referenced via include) ──────────────────
    # Note: cannot use 'include' for a snippet in the http block without
    # separate snippet files; proxy headers are set per-location below.

    # ═══════════════════════════════════════════════════════════════════════════
    # VIRTUAL HOST 0 — shadow-warden-ai.com (marketing landing page)
    # Static HTML served directly by Nginx — no upstream required.
    # Cloudflare terminates TLS; origin listens on port 80.
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 80;
        server_name shadow-warden-ai.com www.shadow-warden-ai.com;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        root  /usr/share/nginx/html/landing;
        index index.html;

        # SPA / single-file fallback — any path returns index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Static assets — cache aggressively (browser + CDN)
        location ~* \.(css|js|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # VIRTUAL HOST 1 — api.shadow-warden-ai.com
    # Shadow Warden filter gateway — public-facing API for SDK clients.
    # Cloudflare terminates TLS; origin receives plain HTTP on port 80.
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 80;
        server_name api.shadow-warden-ai.com;

        client_max_body_size 10M;

        # HSTS tells browsers to always use HTTPS — enforced at Cloudflare edge.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Filter gateway — all paths ────────────────────────────────────────
        location / {
            proxy_pass         https://warden_backend;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;         # restored by real_ip module
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;  # set by Cloudflare
            proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
            proxy_set_header   CF-Ray            $http_cf_ray;
            proxy_set_header   CF-IPCountry      $http_cf_ipcountry;

            proxy_http_version 1.1;
            proxy_set_header   Connection        "";    # enable keepalive to upstream

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 5s;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # VIRTUAL HOST 2 — admin.shadow-warden-ai.com
    # MSP Streamlit dashboard — SAML/OTP-protected, restrict by Cloudflare rule.
    # Recommend: Cloudflare Access policy in front of this hostname.
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 80;
        server_name admin.shadow-warden-ai.com;

        # Restrict to Cloudflare Access JWT verification header
        # (uncomment after setting up Cloudflare Access application)
        # set $cf_access_jwt_assertion $http_cf_access_jwt_assertion;
        # if ($cf_access_jwt_assertion = "") { return 403; }

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Streamlit main app ────────────────────────────────────────────────
        # dashboard_backend upstream is defined above (always running).
        location / {
            proxy_pass         http://dashboard_backend;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;

            # WebSocket support (Streamlit live reload + component streaming)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 86400;  # long-lived WebSocket connections
        }

        # ── Streamlit WebSocket stream (explicit path for reliability) ────────
        location ~* /_stcore/(stream|health|allowed-message-origins) {
            proxy_pass         http://dashboard_backend;

            proxy_set_header   Host      $host;
            proxy_set_header   Upgrade   $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # VIRTUAL HOST 3 — feed.shadow-warden-ai.com (optional)
    # Central threat intelligence feed — POST /rules, GET /feed.json
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 80;
        server_name feed.shadow-warden-ai.com;

        client_max_body_size 1M;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location / {
            set $feed_target "http://feed:8003";
            proxy_pass         $feed_target;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;

            proxy_http_version 1.1;
            proxy_set_header   Connection        "";

            proxy_read_timeout 30s;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # FALLBACK — path-based routing (single domain / dev / Docker internal)
    # Matches any hostname not caught above (server_name _)
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 10m;

        # ── Warden filter gateway ─────────────────────────────────────────────
        location /api/warden/ {
            proxy_pass         https://warden_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
        }

        # ── Threat Feed ───────────────────────────────────────────────────────
        location /feed/ {
            set $feed_target "http://feed:8003";
            proxy_pass         $feed_target/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Analytics API ─────────────────────────────────────────────────────
        location /analytics/ {
            proxy_pass         http://analytics_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Streamlit dashboard (dev / internal — restrict in prod) ───────────
        location /dashboard/ {
            proxy_pass         http://dashboard_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_http_version 1.1;
        }

        location ~* /dashboard/_stcore/(stream|health|allowed-message-origins) {
            proxy_pass         http://dashboard_backend;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_http_version 1.1;
        }

        # ── Admin UI ──────────────────────────────────────────────────────────
        location /admin/ {
            set $admin_target "http://admin:8502";
            proxy_pass         $admin_target/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_http_version 1.1;
        }

        # ── Main application ──────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://app_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass         http://app_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # HTTPS + mTLS — Cloudflare Full (Strict) / direct-to-origin deployments
    # Uncomment and configure when:
    #   a) using Cloudflare SSL mode "Full (Strict)" (requires origin cert), OR
    #   b) exposing the origin directly without Cloudflare (e.g. internal VPN).
    # Run scripts/gen_certs.sh to generate certs/.
    # ═══════════════════════════════════════════════════════════════════════════

    # server {
    #     listen 443 ssl http2;
    #     server_name api.shadow-warden-ai.com;
    #
    #     ssl_certificate         /etc/nginx/certs/warden.crt;
    #     ssl_certificate_key     /etc/nginx/certs/warden.key;
    #     ssl_protocols           TLSv1.2 TLSv1.3;
    #     ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache       shared:SSL:10m;
    #     ssl_session_timeout     1d;
    #     ssl_session_tickets     off;
    #
    #     # mTLS — verify client cert against our internal CA
    #     ssl_client_certificate  /etc/nginx/certs/ca.crt;
    #     ssl_verify_client       optional;
    #     ssl_verify_depth        2;
    #
    #     proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
    #     proxy_set_header X-Client-Cert-Verify  $ssl_client_verify;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #     add_header X-Frame-Options           DENY    always;
    #     add_header X-Content-Type-Options    nosniff always;
    #     add_header Referrer-Policy           strict-origin always;
