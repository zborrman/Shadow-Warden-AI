# ─────────────────────────────────────────────────────────────────────────────
#  Shadow Warden AI — Nginx  (minimal production config)
#
#  Routes:
#    /                           →  static landing page
#    /filter /health /metrics    →  warden:8001  (API)
#    /v1/ /gdpr/ /filter/        →  warden:8001  (API)
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker internal DNS — required for $upstream lazy resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # Security headers
    add_header X-Frame-Options        "DENY"              always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header Referrer-Policy        "strict-origin"     always;
    add_header X-XSS-Protection       "1; mode=block"     always;

    # ── Main server ────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 10M;

        # ACME challenge (for future Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── Landing page (static files) ──────────────────────────────────────
        root /usr/share/nginx/html/landing;
        index index.html;

        location = / {
            try_files /index.html =404;
        }

        location = /login {
            try_files /login.html =404;
        }

        location = /settings {
            try_files /settings.html =404;
        }

        location = /dashboard {
            try_files /dashboard.html =404;
        }

        location = /checkout {
            try_files /checkout.html =404;
        }

        location = /billing {
            try_files /billing.html =404;
        }

        location = /agents {
            try_files /agents.html =404;
        }

        location = /roadmap {
            try_files /roadmap.html =404;
        }

        location = /terms {
            try_files /terms.html =404;
        }

        location = /privacy {
            try_files /privacy.html =404;
        }

        location = /refund {
            try_files /refund.html =404;
        }

        location ~* \.(css|js|woff2?|png|jpg|svg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Warden API — proxy to gateway ────────────────────────────────────
        # Using $upstream variable: lazy per-request DNS resolution so nginx
        # starts cleanly even if warden container is not yet ready.
        location ~ ^/(filter|health|metrics|gdpr|v1|batch|docs|redoc|openapi\.json|portal|api|billing|subscription|agents|mcp) {
            set $upstream http://warden:8001;
            proxy_pass          $upstream;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 5s;
        }

        # Fallback: anything else → landing page
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
