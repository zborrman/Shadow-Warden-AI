version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Shadow Warden AI — Minimal Production Stack  (2 CPU / 4 GB RAM / 40 GB disk)
#
#  ACTIVE (4 services):
#    proxy    — nginx reverse proxy  (port 80)
#    warden   — FastAPI security gateway  (internal :8001)
#    postgres — persistent storage
#    redis    — cache + rate limiting
#
#  DEFERRED (re-enable when server is upgraded to ≥80 GB disk):
#    dashboard  — Streamlit analytics UI
#    analytics  — FastAPI analytics API
#    prometheus — metrics collection
#    grafana    — metrics visualization
#    jaeger     — distributed tracing
#    portal     — customer portal
#    app        — demo application
#    admin      — MSP admin UI
#    feed       — threat intelligence feed
# ─────────────────────────────────────────────────────────────────────────────

networks:
  warden-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  warden-logs:

services:

  # ── PROXY ──────────────────────────────────────────────────────────────────
  proxy:
    image: nginx:alpine
    container_name: warden-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./warden/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - warden-logs:/var/log/nginx
    depends_on:
      - warden
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── WARDEN GATEWAY ─────────────────────────────────────────────────────────
  warden:
    build:
      context: ./warden
      dockerfile: Dockerfile
    container_name: warden-gateway
    restart: unless-stopped
    expose:
      - "8001"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1800M
        reservations:
          memory: 512M
    environment:
      - ENV=${ENV:-development}
      - SECRET_KEY=${SECRET_KEY:-change-me-generate-a-strong-random-key}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-warden_user}:${DB_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-warden}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GDPR_LOG_RETENTION_DAYS=${GDPR_LOG_RETENTION_DAYS:-30}
      - MODEL_CACHE_DIR=/warden/models
      - HF_HOME=/warden/models
      - SEMANTIC_THRESHOLD=${SEMANTIC_THRESHOLD:-0.72}
      - STRICT_MODE=${STRICT_MODE:-false}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DYNAMIC_RULES_PATH=/warden/data/dynamic_rules.json
      - WARDEN_API_KEY=${WARDEN_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://shadow-warden-ai.com,https://www.shadow-warden-ai.com,http://localhost:3000}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      # Browser sandbox deferred (slim image has no Chromium binary)
      - BROWSER_ENABLED=false
      # mTLS disabled — plain HTTP between nginx and warden
      - MTLS_ENABLED=false
      # OpenTelemetry disabled (no Jaeger)
      - OTEL_ENABLED=false
      # Security features
      - SESSION_GUARD_ENABLED=${SESSION_GUARD_ENABLED:-true}
      - HONEY_MODE=${HONEY_MODE:-false}
      - HONEY_INJECT_SECRETS=false
      - POISON_DETECTION_ENABLED=${POISON_DETECTION_ENABLED:-true}
      - CORPUS_SNAPSHOT_PATH=/warden/data/corpus_snapshot
      # Stage 4 / 5 — OutputGuard + WalletShield
      - OUTPUT_GUARDRAILS_ENABLED=${OUTPUT_GUARDRAILS_ENABLED:-true}
      - OUTPUT_MAX_DISCOUNT_PCT=${OUTPUT_MAX_DISCOUNT_PCT:-50}
      - OUTPUT_COMMITMENT_BLOCK=${OUTPUT_COMMITMENT_BLOCK:-true}
      - WALLET_ENABLED=${WALLET_ENABLED:-true}
      - WALLET_DEFAULT_BUDGET=${WALLET_DEFAULT_BUDGET:-100000}
      - WALLET_WINDOW_SECONDS=${WALLET_WINDOW_SECONDS:-3600}
      - WALLET_HARD_LIMIT=${WALLET_HARD_LIMIT:-200000}
      # Alerting (set tokens in .env to activate)
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY:-}
      - ALERT_MIN_RISK_LEVEL=${ALERT_MIN_RISK_LEVEL:-high}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # ONNX (optional — set after running scripts/export_onnx.py)
      - ONNX_MODEL_PATH=${ONNX_MODEL_PATH:-}
      # OpenAI-compatible proxy
      - OPENAI_UPSTREAM=${OPENAI_UPSTREAM:-https://api.openai.com}
      - WARDEN_FILTER_URL=http://warden:8001
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # Dashboard auth
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-admin}
      - DASHBOARD_PASSWORD_HASH=${DASHBOARD_PASSWORD_HASH:-}
    volumes:
      - ./warden/models:/warden/models
      - ./data:/warden/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ── POSTGRES ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: warden-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-warden_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-warden}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - warden-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warden_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REDIS ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: warden-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
