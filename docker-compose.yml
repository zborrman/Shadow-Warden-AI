version: "3.9"

# ─────────────────────────────────────────────
#  Shadow Warden AI — Orchestrator
#  Services: proxy | warden | app | analytics | dashboard | postgres | redis
#            prometheus | grafana
#  Targets: US / EU  |  GDPR-compliant logging
#  Dashboard:  http://localhost:8501  (Streamlit)
#  Grafana:    http://localhost:3000  (Prometheus-backed metrics)
#  Metrics:    http://localhost:8001/metrics  (Prometheus scrape target)
# ─────────────────────────────────────────────

networks:
  warden-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  analytics-data:
  warden-logs:
  warden-models:      # persists all-MiniLM-L6-v2 across container restarts
  prometheus-data:
  grafana-data:

services:

  # ── 1. PROXY ─────────────────────────────────
  # Public-facing reverse proxy. Routes /api/warden/* → warden,
  # /api/* → app, /analytics/* → analytics.
  proxy:
    image: nginx:alpine
    container_name: warden-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./warden/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./warden/nginx/certs:/etc/nginx/certs:ro
      - warden-logs:/var/log/nginx
    depends_on:
      - warden
      - app
      - analytics
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── 2. WARDEN ────────────────────────────────
  # FastAPI filter gateway + browser sandbox.
  # Every payload from app/ passes through /filter first.
  # Playwright (Chromium) runs inside this container for
  # active security auditing via BrowserSandbox.
  warden:
    build:
      context: ./warden
      dockerfile: Dockerfile
    container_name: warden-gateway
    restart: unless-stopped
    expose:
      - "8001"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    environment:
      - ENV=${ENV:-development}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GDPR_LOG_RETENTION_DAYS=${GDPR_LOG_RETENTION_DAYS:-30}
      - MODEL_CACHE_DIR=/warden/models
      - SEMANTIC_THRESHOLD=${SEMANTIC_THRESHOLD:-0.72}
      - STRICT_MODE=${STRICT_MODE:-false}
      # Evolution Loop — set to enable automated rule generation via Claude Opus.
      # Leave unset to run in offline/air-gapped mode (all other features work).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DYNAMIC_RULES_PATH=/warden/data/dynamic_rules.json
      # ── New in v0.3 ──────────────────────────────────────────────────────────
      - WARDEN_API_KEY=${WARDEN_API_KEY:-}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY:-}
      - ALERT_MIN_RISK_LEVEL=${ALERT_MIN_RISK_LEVEL:-high}
      - SPLUNK_HEC_URL=${SPLUNK_HEC_URL:-}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN:-}
      - ELASTIC_URL=${ELASTIC_URL:-}
      - ELASTIC_API_KEY=${ELASTIC_API_KEY:-}
      - ELASTIC_INDEX=${ELASTIC_INDEX:-shadow-warden-events}
    volumes:
      - ./warden:/warden/src          # hot-reload in dev
      - warden-models:/warden/models  # persists MiniLM weights
      - warden-logs:/warden/logs
      - ./data:/warden/data           # dynamic_rules.json lives here
    # Playwright / Chromium needs at least 256 MB of /dev/shm.
    # We also pass --disable-dev-shm-usage in browser.py launch args
    # as a belt-and-suspenders fallback.
    shm_size: "512mb"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ── 3. APP ───────────────────────────────────
  # Main Shadow Warden application.
  # All outbound AI payloads must pass through warden:8001/filter.
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: warden-app
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - ENV=${ENV:-development}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/2
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WARDEN_URL=http://warden:8001        # all payloads filtered here first
    volumes:
      - ./app:/app
      - warden-logs:/app/logs
    depends_on:
      warden:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ── 4. ANALYTICS ─────────────────────────────
  # GDPR-compliant event collection and reporting.
  # Anonymises PII before storage, enforces
  # configurable data-retention windows.
  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: warden-analytics
    restart: unless-stopped
    expose:
      - "8002"
    environment:
      - ENV=${ENV:-development}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/1
      - ANALYTICS_DATA_PATH=/analytics/data
      - GDPR_ANONYMISE=true
      - GDPR_LOG_RETENTION_DAYS=${GDPR_LOG_RETENTION_DAYS:-30}
    volumes:
      - ./analytics:/analytics/src
      - analytics-data:/analytics/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ── 5. DASHBOARD ─────────────────────────────
  # Streamlit analytics dashboard.
  # Reads data/logs.json written by the warden gateway.
  # Access: http://localhost:8501
  dashboard:
    build:
      context: ./warden
      dockerfile: Dockerfile
    container_name: warden-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    command: >
      streamlit run warden/analytics/dashboard.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
    environment:
      - LOGS_PATH=/warden/data/logs.json
      - GDPR_LOG_RETENTION_DAYS=${GDPR_LOG_RETENTION_DAYS:-30}
    volumes:
      - ./warden:/warden/src          # hot-reload in dev
      - ./data:/warden/data           # reads logs.json written by warden gateway
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── POSTGRES ──────────────────────────────────
  # Shared relational store. One DB, two schemas:
  # warden_core (app) and warden_analytics.
  postgres:
    image: postgres:16-alpine
    container_name: warden-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-warden}
      - POSTGRES_PASSWORD=${POSTGRES_PASS}
      - POSTGRES_DB=${POSTGRES_DB:-warden_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - warden-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warden}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REDIS ─────────────────────────────────────
  # Shared cache and message bus.
  # DB 0 → warden filter cache + slowapi rate-limit
  # DB 1 → analytics event queue
  # DB 2 → app session
  redis:
    image: redis:7-alpine
    container_name: warden-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── PROMETHEUS ────────────────────────────────
  # Scrapes /metrics from the warden gateway every 15 s.
  # Grafana uses this as its data source.
  prometheus:
    image: prom/prometheus:latest
    container_name: warden-prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      warden:
        condition: service_healthy
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── GRAFANA ───────────────────────────────────
  # Pre-provisioned with the Prometheus data source and
  # the Shadow Warden dashboard (grafana/dashboards/).
  # Access: http://localhost:3000  (admin / ${GRAFANA_PASSWORD:-admin})
  grafana:
    image: grafana/grafana:latest
    container_name: warden-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
