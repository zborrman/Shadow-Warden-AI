# ─────────────────────────────────────────────────────────────────────────────
#  Shadow Warden AI — Full Production Stack  (8 vCPU / 16 GB RAM / 40 GB disk)
#
#  ACTIVE SERVICES:
#    proxy      — nginx reverse proxy          (80 / 443)
#    warden     — FastAPI security gateway     (internal :8001)
#    postgres   — persistent storage
#    redis      — cache + rate limiting
#    minio      — S3-compatible object storage (9000 / 9001 console)
#    analytics  — FastAPI analytics API        (internal :8002)
#    admin      — Streamlit MSP admin UI       (internal :8502)
#    prometheus — metrics scraper              (internal :9090)
#    grafana    — metrics dashboard            (3001 external)
#    jaeger     — distributed tracing          (16686 UI / OTLP 4317/4318)
#    portal     — Next.js tenant UI            (internal :3001, via nginx)
# ─────────────────────────────────────────────────────────────────────────────

networks:
  warden-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  warden-logs:
  minio-data:
  prometheus-data:
  grafana-data:

services:

  # ── PROXY ──────────────────────────────────────────────────────────────────
  proxy:
    image: nginx:alpine
    container_name: warden-proxy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./warden/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./landing:/usr/share/nginx/html/landing:ro
      - ./ssl:/etc/nginx/ssl:ro
      - warden-logs:/var/log/nginx
    depends_on:
      warden:
        condition: service_started
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── WARDEN GATEWAY ─────────────────────────────────────────────────────────
  warden:
    build:
      context: ./warden
      dockerfile: Dockerfile
    # container_name removed — allows docker compose up --scale warden=N
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "8001"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8192M
        reservations:
          memory: 2048M
    environment:
      - ENV=${ENV:-development}
      - SECRET_KEY=${SECRET_KEY:-change-me-generate-a-strong-random-key}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-warden_user}:${DB_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-warden}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GDPR_LOG_RETENTION_DAYS=${GDPR_LOG_RETENTION_DAYS:-7}
      - MODEL_CACHE_DIR=/warden/models
      - HF_HOME=/warden/models
      - UVICORN_WORKERS=${UVICORN_WORKERS:-4}
      - SEMANTIC_THRESHOLD=${SEMANTIC_THRESHOLD:-0.72}
      - STRICT_MODE=${STRICT_MODE:-false}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DYNAMIC_RULES_PATH=/warden/data/dynamic_rules.json
      - WARDEN_API_KEY=${WARDEN_API_KEY:-}
      - SUPER_ADMIN_KEY=${SUPER_ADMIN_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://shadow-warden-ai.com,https://www.shadow-warden-ai.com,http://localhost:3000}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      # Browser sandbox deferred (slim image has no Chromium binary)
      - BROWSER_ENABLED=false
      # mTLS disabled — plain HTTP between nginx and warden
      - MTLS_ENABLED=false
      # OpenTelemetry — enable by setting OTEL_ENABLED=true in .env
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      # Security features
      - SESSION_GUARD_ENABLED=${SESSION_GUARD_ENABLED:-true}
      - HONEY_MODE=${HONEY_MODE:-false}
      - HONEY_INJECT_SECRETS=false
      - POISON_DETECTION_ENABLED=${POISON_DETECTION_ENABLED:-true}
      - CORPUS_SNAPSHOT_PATH=/warden/data/corpus_snapshot
      # Stage 4 / 5 — OutputGuard + WalletShield
      - OUTPUT_GUARDRAILS_ENABLED=${OUTPUT_GUARDRAILS_ENABLED:-true}
      - OUTPUT_MAX_DISCOUNT_PCT=${OUTPUT_MAX_DISCOUNT_PCT:-50}
      - OUTPUT_COMMITMENT_BLOCK=${OUTPUT_COMMITMENT_BLOCK:-true}
      - WALLET_ENABLED=${WALLET_ENABLED:-true}
      - WALLET_DEFAULT_BUDGET=${WALLET_DEFAULT_BUDGET:-100000}
      - WALLET_WINDOW_SECONDS=${WALLET_WINDOW_SECONDS:-3600}
      - WALLET_HARD_LIMIT=${WALLET_HARD_LIMIT:-200000}
      # Lemon Squeezy billing (set in .env to activate)
      - LEMONSQUEEZY_API_KEY=${LEMONSQUEEZY_API_KEY:-}
      - LEMONSQUEEZY_STORE_ID=${LEMONSQUEEZY_STORE_ID:-}
      - LEMONSQUEEZY_WEBHOOK_SECRET=${LEMONSQUEEZY_WEBHOOK_SECRET:-}
      - LEMONSQUEEZY_VARIANT_INDIVIDUAL=${LEMONSQUEEZY_VARIANT_INDIVIDUAL:-}
      - LEMONSQUEEZY_VARIANT_PRO=${LEMONSQUEEZY_VARIANT_PRO:-}
      - LEMONSQUEEZY_VARIANT_ENTERPRISE=${LEMONSQUEEZY_VARIANT_ENTERPRISE:-}
      # Alerting (set tokens in .env to activate)
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY:-}
      - ALERT_MIN_RISK_LEVEL=${ALERT_MIN_RISK_LEVEL:-high}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # ONNX Runtime (optional — set after running scripts/export_onnx.py --quantize)
      # Thread tuning for 8 vCPU / 4 uvicorn workers:
      #   inter_op = 1 (ops run sequentially — avoids thread contention between workers)
      #   intra_op = 2 (each ONNX op uses 2 threads — 4 workers × 2 = 8 vCPU fully used)
      # With INT8 quantization (--quantize flag) this gives ~3-4× faster inference vs PyTorch.
      - ONNX_MODEL_PATH=${ONNX_MODEL_PATH:-}
      - ONNX_THREADS=${ONNX_THREADS:-1}
      - ONNX_INTRA_THREADS=${ONNX_INTRA_THREADS:-2}
      # OpenAI-compatible proxy
      - OPENAI_UPSTREAM=${OPENAI_UPSTREAM:-https://api.openai.com}
      - WARDEN_FILTER_URL=http://warden:8001
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # v1.0 — NVIDIA NIM (Nemotron, Llama, Mistral via integrate.api.nvidia.com)
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      # v0.7 — Azure OpenAI
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-05-01-preview}
      # v0.7 — Amazon Bedrock
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # v0.7 — Google Vertex AI
      - VERTEX_PROJECT_ID=${VERTEX_PROJECT_ID:-}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-us-central1}
      - VERTEX_ACCESS_TOKEN=${VERTEX_ACCESS_TOKEN:-}
      # v2.1 — Data-Gravity Hybrid Hub (S3-compatible on-prem object storage)
      - S3_ENABLED=${S3_ENABLED:-false}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET_EVIDENCE=${S3_BUCKET_EVIDENCE:-warden-evidence}
      - S3_BUCKET_LOGS=${S3_BUCKET_LOGS:-warden-logs}
      - S3_REGION=${S3_REGION:-us-east-1}
      # v0.8 — Prompt Shield (indirect injection detection)
      # Warden Nexus — Global Threat Intelligence Feed (opt-in)
      # Set THREAT_FEED_ENABLED=true and THREAT_FEED_URL after signing up.
      # SMB nodes: contribute + receive (default).
      # Enterprise air-gapped: set THREAT_FEED_RECEIVE_ONLY=true.
      - THREAT_FEED_ENABLED=${THREAT_FEED_ENABLED:-false}
      - THREAT_FEED_URL=${THREAT_FEED_URL:-}
      - THREAT_FEED_API_KEY=${THREAT_FEED_API_KEY:-}
      - THREAT_FEED_SYNC_HRS=${THREAT_FEED_SYNC_HRS:-6}
      - THREAT_FEED_RECEIVE_ONLY=${THREAT_FEED_RECEIVE_ONLY:-false}
      - THREAT_FEED_CONSENSUS_THRESHOLD=${THREAT_FEED_CONSENSUS_THRESHOLD:-0.80}
      - PROMPT_SHIELD_ENABLED=${PROMPT_SHIELD_ENABLED:-true}
      # v0.9 — Cryptographic Audit Trail (SOC 2 Type II)
      - AUDIT_TRAIL_ENABLED=${AUDIT_TRAIL_ENABLED:-true}
      - AUDIT_TRAIL_PATH=/warden/data/audit_trail.db
      # v1.1 — Enterprise resilience & ML hardening
      - WARDEN_FAIL_STRATEGY=${WARDEN_FAIL_STRATEGY:-open}
      - PIPELINE_TIMEOUT_MS=${PIPELINE_TIMEOUT_MS:-0}
      - UNCERTAINTY_LOWER_THRESHOLD=${UNCERTAINTY_LOWER_THRESHOLD:-0.55}
      # Contact form SMTP (set in .env to enable email delivery)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - CONTACT_TO_EMAIL=${CONTACT_TO_EMAIL:-vz@shadow-warden-ai.com}
      - PORTAL_FROM_EMAIL=${PORTAL_FROM_EMAIL:-}
      - PORTAL_URL=${PORTAL_URL:-https://app.shadow-warden-ai.com}
      # Dashboard auth
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-admin}
      - DASHBOARD_PASSWORD_HASH=${DASHBOARD_PASSWORD_HASH:-}
      # Portal JWT (generate: openssl rand -hex 32)
      - PORTAL_JWT_SECRET=${PORTAL_JWT_SECRET:-change-me-generate-a-strong-secret-key-32ch}
      - PORTAL_ACCESS_TOKEN_TTL=${PORTAL_ACCESS_TOKEN_TTL:-60}
      - PORTAL_REFRESH_TOKEN_TTL=${PORTAL_REFRESH_TOKEN_TTL:-7}
    volumes:
      - ./warden/models:/warden/models
      - ./scripts:/warden/scripts:ro
      - ./data:/warden/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]

      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 180s

  # ── ARQ WORKER (background tasks: weekly ROI emails, geo-webhooks) ─────────
  arq-worker:
    build:
      context: ./warden
      dockerfile: Dockerfile
    container_name: warden-arq-worker
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    environment:
      - ARQ_MODE=1
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-warden_user}:${DB_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-warden}
      - LOGS_PATH=/warden/data/logs.json
      - LEMONSQUEEZY_DB_PATH=/warden/data/lemon.db
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - WEEKLY_REPORT_FROM=${WEEKLY_REPORT_FROM:-}
      - WEEKLY_REPORT_REPLY_TO=${WEEKLY_REPORT_REPLY_TO:-}
      - PORTAL_URL=${PORTAL_URL:-https://app.shadow-warden-ai.com}
      - IMPACT_COST_PER_BLOCK_USD=${IMPACT_COST_PER_BLOCK_USD:-100.0}
      - GEO_WEBHOOK_URL=${GEO_WEBHOOK_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./data:/warden/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - warden-net

  # ── POSTGRES ────────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: warden-postgres
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-warden_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-warden}
    command: postgres -c shared_preload_libraries=timescaledb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - warden-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warden_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MINIO (S3-compatible on-prem object storage) ────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: warden-minio
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API (internal + optional external access)
      - "9001:9001"   # MinIO Console UI
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── MINIO INIT (create buckets on first start) ────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: warden-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - warden-net
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/${S3_BUCKET_EVIDENCE:-warden-evidence};
        mc mb --ignore-existing local/${S3_BUCKET_LOGS:-warden-logs};
        mc anonymous set none local/${S3_BUCKET_EVIDENCE:-warden-evidence};
        mc anonymous set none local/${S3_BUCKET_LOGS:-warden-logs};
        echo 'MinIO buckets ready.';
      "
    restart: on-failure

  # ── REDIS ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: warden-redis
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: redis-server --save 60 1 --loglevel warning --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── ANALYTICS ──────────────────────────────────────────────────────────────
  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: warden-analytics
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "8002"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      - LOGS_PATH=/data/logs.json
      - GDPR_LOG_RETENTION_DAYS=${GDPR_LOG_RETENTION_DAYS:-7}
    volumes:
      - ./data:/data:ro
    depends_on:
      warden:
        condition: service_started
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── ADMIN UI ────────────────────────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: warden-admin
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "8502"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      - WARDEN_URL=http://warden:8001
      - WARDEN_API_KEY=${WARDEN_API_KEY:-}
      - LOGS_PATH=/data/logs.json
      - DYNAMIC_RULES_PATH=/data/dynamic_rules.json
    volumes:
      - ./data:/data:ro
    depends_on:
      warden:
        condition: service_started
    networks:
      - warden-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8502/_stcore/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── PROMETHEUS ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: warden-prometheus
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "9090"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      warden:
        condition: service_started
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── GRAFANA ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: warden-grafana
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "3001:3000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-warden-grafana}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:3001
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── PORTAL (Next.js tenant UI) ──────────────────────────────────────────────
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.shadow-warden-ai.com}
    container_name: warden-portal
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "3001"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - WARDEN_INTERNAL_URL=http://warden:8001
      - WARDEN_SUPER_ADMIN_KEY=${SUPER_ADMIN_KEY:-}
      - PORTAL_JWT_SECRET=${PORTAL_JWT_SECRET:-}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.shadow-warden-ai.com}
    depends_on:
      warden:
        condition: service_started
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/login/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── JAEGER (distributed tracing) ────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: warden-jaeger
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "16686:16686"    # Jaeger UI
    expose:
      - "4317"           # OTLP gRPC
      - "4318"           # OTLP HTTP
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=${JAEGER_MAX_TRACES:-50000}
    networks:
      - warden-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:14269/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
