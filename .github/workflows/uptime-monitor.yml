name: Uptime Monitor

# Stage 2d — external synthetic health check, independent of the server.
#
# The origin firewall only admits Cloudflare ranges (good), and Cloudflare Bot
# Fight Mode 403s datacenter-origin requests — so a GitHub-runner probe may be
# blocked until the WAF skip rule documented in docs/cloudflare-waf.md
# ("Health-check skip rule") is added. Residential/browser traffic passes.
#
# Behaviour:
#   200            → healthy, job green
#   403            → blocked by Cloudflare (job fails with pointer to the doc)
#   other/timeout  → outage (job fails) → Slack notification if webhook set

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  probe:
    name: Probe /health
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Probe public health endpoint
        id: probe
        run: |
          # Retry to absorb transient edge blips (a single Cloudflare 502/504 or
          # timeout is normal and must not red the pipeline). Only a persistent
          # non-200 across all attempts is treated as a real outage.
          #
          # Budget must outlast a routine deploy swap. The CI deploy builds images
          # first (old stack still serving), then does a down+up swap whose only
          # gap is the container recreate + warden ML-model warmup (~2.5-3 min).
          # The old 6x20s (~100s) budget false-alarmed on that swap (HTTP 530 on
          # every attempt when a scheduled probe coincided with a deploy). 12x20s
          # (~4 min) comfortably covers the swap, while a genuine outage longer than
          # that still fails within the 8-min job cap.
          ATTEMPTS=12
          DELAY=20
          CODE=000
          for i in $(seq 1 "$ATTEMPTS"); do
            CODE=$(curl -s -m 15 -o /tmp/health_body -w '%{http_code}' \
              -A "shadow-warden-uptime-monitor" \
              https://api.shadow-warden-ai.com/health || echo 000)
            echo "attempt $i/$ATTEMPTS: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              break
            fi
            [ "$i" -lt "$ATTEMPTS" ] && sleep "$DELAY"
          done
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "## Uptime probe: HTTP $CODE (after up to $ATTEMPTS attempts)" >> "$GITHUB_STEP_SUMMARY"
          head -c 400 /tmp/health_body >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          if [ "$CODE" = "200" ]; then
            echo "healthy"
          elif [ "$CODE" = "403" ]; then
            echo "::error::Blocked by Cloudflare Bot Fight Mode — add the health-check skip rule from docs/cloudflare-waf.md"
            exit 1
          else
            echo "::error::Health endpoint returned $CODE on all $ATTEMPTS attempts — possible outage"
            exit 1
          fi

      - name: Slack alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CODE: ${{ steps.probe.outputs.code }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && { echo "no webhook configured"; exit 0; }
          curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' \
            -d "{\"attachments\":[{\"color\":\"danger\",\"text\":\"🚨 *Uptime probe failed* — api.shadow-warden-ai.com/health returned HTTP ${CODE:-000}\"}]}"
