version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/warden"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    ignore:
      # Playwright is pinned — browser sandbox is disabled (BROWSER_ENABLED=false).
      # Upgrading requires re-enabling MCR base image + playwright install chromium.
      - dependency-name: "playwright"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
