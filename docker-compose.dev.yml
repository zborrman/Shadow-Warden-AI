# docker-compose.dev.yml — Shadow Warden AI development overlay
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#   OR:
#   make up-dev
#
# What this overlay adds vs production:
#   • Bind-mounts source dirs → edits take effect without rebuilding
#   • Uvicorn --reload for warden and analytics (auto-restart on file change)
#   • DEBUG log level
#   • No resource limits (allows profiling / debuggers)
#   • Exposes Postgres port for direct DB inspection
#   • Mounts ./data and ./warden/models locally (survives container restarts)

services:

  warden:
    volumes:
      # Source hot-reload
      - ./warden:/app/warden:ro
      # Persist model weights locally (avoid re-download)
      - ./warden/models:/warden/models
      # Writable log/rule files land on the host
      - ./data:/data
    command: >
      uvicorn warden.main:app
        --host 0.0.0.0
        --port 8001
        --reload
        --reload-dir /app/warden
        --log-level debug
    environment:
      LOG_LEVEL: debug
      LOGS_PATH: /data/logs.json
      DYNAMIC_RULES_PATH: /data/dynamic_rules.json
      ALLOW_UNAUTHENTICATED: "true"
    # Compose Watch (docker compose watch) — restarts warden on file change.
    # Merged from the removed docker-compose.override.yml (which auto-merged
    # everywhere, including production — see commit message).
    develop:
      watch:
        - action: sync
          path: ./warden
          target: /app/warden
          ignore:
            - __pycache__/
            - "*.pyc"
            - tests/
            - models/
        - action: rebuild
          path: ./warden/requirements.txt

  analytics:
    volumes:
      - ./analytics:/app/analytics:ro
      - ./data:/data:ro
    command: >
      uvicorn analytics.main:app
        --host 0.0.0.0
        --port 8002
        --reload
        --reload-dir /app/analytics
        --log-level debug
    environment:
      LOG_LEVEL: debug
      LOGS_PATH: /data/logs.json


  postgres:
    # Expose Postgres in dev for psql / pgAdmin / DBeaver
    ports:
      - "5432:5432"

  redis:
    # Expose Redis in dev for redis-cli inspection
    ports:
      - "6379:6379"

  prometheus:
    ports:
      - "9090:9090"    # direct access in dev only
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    ports:
      - "3001:3000"    # direct access in dev only
    environment:
      GF_LOG_LEVEL: debug

  jaeger:
    ports:
      - "16686:16686"  # Jaeger UI in dev only
      - "4317:4317"    # OTLP gRPC from host in dev only

  dashboard:
    ports:
      - "3002:3002"

  proxy:
    # Use HTTP-only Caddyfile for local dev (no TLS certs needed)
    volumes:
      - ./docker/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./landing:/srv/landing:ro
      - caddy-data:/data
      - warden-logs:/var/log/caddy
    ports:
      - "80:80"
      - "8081:8081"
      - "8082:8082"
